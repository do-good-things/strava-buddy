<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ridesometime</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.3/mapbox-gl-geocoder.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
    .container { max-width: 1400px; margin: 0 auto; padding: 2rem; width: 100%; flex: 1; display: flex; flex-direction: column; }


    .site-blurb { font-size: 0.8rem; color: #aaa; letter-spacing: 0.02em; }
    .back-link { font-size: 0.8rem; color: #ccc; text-decoration: none; }
    @media (hover: hover) { .back-link:hover { color: #999; } }
    .map-row { display: flex; flex: 1; gap: 1rem; }
    .regions { display: flex; flex-direction: column; gap: 0.25rem; padding-top: 0.25rem; }
    .region-btn { padding: 0.3rem 0.1rem; background: none; border: none; font-size: 1rem; cursor: pointer; color: #999; transition: color 0.15s; text-transform: lowercase; font-family: inherit; text-align: right; white-space: nowrap; }
    @media (hover: hover) { .region-btn:hover { color: #e040a0; } }
    .region-btn.active { color: #fc4c02; }
    .region-btn .count { font-size: 0.7rem; margin-left: 3px; color: #ccc; }
    .region-btn.active .count { color: #f4a57a; }
    .map-wrap { position: relative; flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .site-footer { margin-top: 1.25rem; }
    .profile-card { position: absolute; top: 12px; left: 12px; z-index: 1; background: #fff; padding: 0.5rem 0.7rem; border-radius: 4px; border: none; box-shadow: 0 0 0 2px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: inherit; transition: background 0.15s; width: auto; }
    @media (hover: hover) { .profile-card:hover { background: #f0f0f0; } }
    .profile-card img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    .profile-card .profile-info { display: flex; flex-direction: column; }
    .profile-card .profile-name { font-size: 0.8rem; font-weight: 600; color: #333; }
    .profile-card .profile-city { font-size: 0.7rem; color: #999; }
    .ride-detail { display: none; position: absolute; top: 12px; left: 12px; z-index: 1; background: #fff; padding: 0.6rem 0.9rem; border-radius: 4px; border: none; box-shadow: 0 0 0 2px rgba(0,0,0,0.1); max-width: 280px; }
    .ride-detail.visible { display: block; }
    .ride-detail .ride-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.3rem; }
    .ride-detail .ride-stats { font-size: 0.75rem; color: #777; line-height: 1.5; }
    #map { width: 100%; flex: 1; min-height: 500px; border-radius: 4px; box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }
    #map .mapboxgl-canvas-container,
    #map .mapboxgl-canvas-container.mapboxgl-interactive { cursor: default; }
    .mapboxgl-ctrl-top-right { top: 2px; }
    .mapboxgl-ctrl-geocoder { box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }
    .mapboxgl-ctrl-geocoder input[type="text"] { outline: none; }
    .mapboxgl-ctrl-geocoder input[type="text"]:focus { outline: none; }

    @media (max-width: 600px) {
      html, body { height: 100svh; min-height: 0; margin: 0; overflow: hidden; }
      body { display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
      .container { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; min-height: 0; gap: 0.5rem; }
      .map-row { flex-direction: column; gap: 0.5rem; flex: 1; min-height: 0; }
      .map-wrap { flex: 1; min-height: 0; }
      .regions { flex-direction: row; flex-wrap: wrap; gap: 0.5rem; flex-shrink: 0; }
      .region-btn { font-size: 0.75rem; }
      .site-footer { margin: 0; order: -1; flex-shrink: 0; }
      .site-blurb { font-size: 0.8rem; padding: 0.3rem 0; }
      #map { min-height: 0; flex: 1; border-radius: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="map-row">
    <div class="map-wrap">
      <a class="profile-card" id="profile-card" href="#" target="_blank" rel="noopener" style="display:none">
        <img src="" alt="" id="profile-avatar">
        <div class="profile-info">
          <span class="profile-name" id="profile-name"></span>
          <span class="profile-city" id="profile-city"></span>
        </div>
      </a>
      <div id="ride-detail" class="ride-detail">
        <div class="ride-name" id="ride-name"></div>
        <div class="ride-stats" id="ride-stats"></div>
      </div>
      <div id="map"></div>
    </div>
    <div id="regions" class="regions"></div>
    </div>
    <div class="site-footer">
      <a class="back-link" href="/">back</a>
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    const ATHLETE_ID = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
    const HOME = { center: [-122.52, 37.82], zoom: window.innerWidth <= 600 ? 10 : 11 };
    let REGIONS = [];
    const LINE_COLOR = ['interpolate', ['linear'], ['get', 'age'], 0, '#4060e0', 0.5, '#e040a0', 1, '#fc4c02'];
    const NO_MATCH = ['==', ['id'], -1];

    let map, geojson, activeRegion = null, selectedId = null;

    // Split a LineString into MultiLineString when consecutive points are > maxGapKm apart
    function splitGaps(coords, maxGapKm = 5) {
      if (coords.length < 2) return [coords];
      const segments = [];
      let seg = [coords[0]];
      for (let i = 1; i < coords.length; i++) {
        const [lng1, lat1] = coords[i - 1], [lng2, lat2] = coords[i];
        const dlat = (lat2 - lat1) * Math.PI / 180, dlng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dlat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dlng / 2) ** 2;
        const km = 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        if (km > maxGapKm) {
          if (seg.length >= 2) segments.push(seg);
          seg = [coords[i]];
        } else {
          seg.push(coords[i]);
        }
      }
      if (seg.length >= 2) segments.push(seg);
      return segments;
    }

    async function init() {
      // Load profile
      try {
        const profile = await fetch(`/data/${ATHLETE_ID}/profile.json`).then(r => r.json());
        const card = document.getElementById('profile-card');
        card.href = `https://www.strava.com/athletes/${profile.id}`;
        card.style.display = '';
        document.getElementById('profile-avatar').src = profile.profile_medium;
        document.getElementById('profile-avatar').alt = `${profile.firstname} ${profile.lastname}`;
        document.getElementById('profile-name').textContent = `${profile.firstname} ${profile.lastname}`;
        document.getElementById('profile-city').textContent = profile.city || '';
        document.title = `${profile.firstname}'s rides - ridesometime`;
      } catch (e) {
        console.warn('Could not load profile:', e);
      }

      // Load rides and regions
      try {
        geojson = await fetch(`/data/${ATHLETE_ID}/rides.json`).then(r => r.json());
      } catch (e) {
        geojson = { type: 'FeatureCollection', features: [] };
      }
      try {
        REGIONS = await fetch(`/data/${ATHLETE_ID}/regions.json`).then(r => r.json());
      } catch (e) {
        REGIONS = [];
      }

      // Split rides at large GPS gaps to avoid long straight lines over water/pauses
      geojson.features.forEach(f => {
        if (f.geometry.type === 'LineString') {
          const segments = splitGaps(f.geometry.coordinates);
          if (segments.length > 1) {
            f.geometry = { type: 'MultiLineString', coordinates: segments };
          } else if (segments.length === 1) {
            f.geometry.coordinates = segments[0];
          }
        }
      });

      // Tag rides with region + age
      const dates = geojson.features.map(f => new Date(f.properties.date).getTime());
      const minDate = Math.min(...dates), dateRange = Math.max(...dates) - minDate || 1;
      geojson.features.forEach((f, i) => {
        f.id = i;
        const allCoords = f.geometry.type === 'MultiLineString' ? f.geometry.coordinates.flat() : f.geometry.coordinates;
        const [lng, lat] = allCoords[Math.floor(allCoords.length / 2)] || [0, 0];
        f.properties.region = (REGIONS.find(r => {
          const [[minLng, minLat], [maxLng, maxLat]] = r.bounds;
          return lat >= minLat && lat <= maxLat && lng >= minLng && lng <= maxLng;
        }) || { name: 'other' }).name;
        f.properties.age = (new Date(f.properties.date).getTime() - minDate) / dateRange;
      });

      // Compute initial view from ride data
      let initView = HOME;
      if (geojson.features.length > 0) {
        const bounds = new mapboxgl.LngLatBounds();
        geojson.features.forEach(f => {
          const coords = f.geometry.type === 'MultiLineString' ? f.geometry.coordinates.flat() : f.geometry.coordinates;
          coords.forEach(c => bounds.extend(c));
        });
        initView = { bounds, fitBoundsOptions: { padding: 60 } };
      }

      // Count rides per region
      const counts = {};
      geojson.features.forEach(f => { counts[f.properties.region] = (counts[f.properties.region] || 0) + 1; });

      // Build tabs
      const regionsEl = document.getElementById('regions');
      addTab(regionsEl, 'all', geojson.features.length, (btn) => {
        setActiveTab(btn);
        activeRegion = null;
        selectedId = null;
        hideRideDetail();
        applyFilter(null);
        if (initView.bounds) {
          map.fitBounds(initView.bounds, { padding: 60, duration: 1500 });
        } else {
          map.flyTo({ ...HOME, duration: 1500 });
        }
      });
      REGIONS.forEach(r => {
        addTab(regionsEl, r.name, counts[r.name] || r.count || 0, (btn) => {
          hideRideDetail();
          if (btn.classList.contains('active')) {
            setActiveTab(document.querySelector('.region-btn'));
            activeRegion = null;
            selectedId = null;
            applyFilter(null);
            if (initView.bounds) {
              map.fitBounds(initView.bounds, { padding: 60, duration: 1500 });
            } else {
              map.flyTo({ ...HOME, duration: 1500 });
            }
          } else {
            setActiveTab(btn);
            activeRegion = r;
            selectedId = null;
            applyFilter(['==', ['get', 'region'], r.name]);
            map.fitBounds(r.bounds, { padding: 40, duration: 1500 });
          }
        });
      });

      // Init map
      mapboxgl.accessToken = MAPBOX_TOKEN;
      map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/light-v11', ...HOME });
      if (initView.bounds) {
        map.fitBounds(initView.bounds, { padding: 60, duration: 0 });
      }
      map.addControl(new MapboxGeocoder({ accessToken: MAPBOX_TOKEN, mapboxgl, marker: false, collapsed: true, placeholder: 'Search location...', flyTo: { speed: 5, curve: 1, zoom: 11 } }), 'top-right');
      map.addControl(new mapboxgl.NavigationControl());
      const geoInput = document.querySelector('.mapboxgl-ctrl-geocoder input');
      if (geoInput) { geoInput.spellcheck = false; geoInput.autocomplete = 'off'; geoInput.autocorrect = 'off'; geoInput.autocapitalize = 'off'; }

      map.on('load', () => {
        map.addSource('rides', { type: 'geojson', data: geojson, tolerance: 0.5 });
        map.addLayer({ id: 'rides-hit', type: 'line', source: 'rides', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': '#000', 'line-width': 14, 'line-opacity': 0 } });
        map.addLayer({ id: 'rides-layer', type: 'line', source: 'rides', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': LINE_COLOR, 'line-width': 2, 'line-opacity': 0.6 } });
        map.addLayer({ id: 'rides-hover', type: 'line', source: 'rides', layout: { 'line-join': 'round', 'line-cap': 'round' }, paint: { 'line-color': LINE_COLOR, 'line-width': 3, 'line-opacity': 0.9 }, filter: NO_MATCH });

        // Hover
        map.on('mouseenter', 'rides-hit', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'rides-hit', () => { map.getCanvas().style.cursor = ''; map.setFilter('rides-hover', NO_MATCH); });
        map.on('mousemove', 'rides-hit', e => { if (e.features.length) map.setFilter('rides-hover', ['==', ['id'], e.features[0].id]); });

        // Click ride: isolate + zoom
        map.on('click', 'rides-hit', e => {
          if (!e.features.length) return;
          selectedId = e.features[0].id;
          setActiveTab(document.querySelector('.region-btn'));
          activeRegion = null;
          map.setFilter('rides-layer', ['==', ['id'], selectedId]);
          map.setFilter('rides-hit', NO_MATCH);
          map.setFilter('rides-hover', NO_MATCH);
          map.getCanvas().style.cursor = '';
          showRideDetail(geojson.features[selectedId].properties);
          const bounds = new mapboxgl.LngLatBounds();
          const geom = geojson.features[selectedId].geometry;
          const clickCoords = geom.type === 'MultiLineString' ? geom.coordinates.flat() : geom.coordinates;
          clickCoords.forEach(c => bounds.extend(c));
          map.fitBounds(bounds, { padding: 60, duration: 1000 });
        });

        // Click empty space: deselect
        map.on('click', e => {
          if (selectedId === null) return;
          if (map.queryRenderedFeatures(e.point, { layers: ['rides-hit'] }).length) return;
          selectedId = null;
          hideRideDetail();
          applyFilter(null);
        });
      });
    }

    function fmtTime(s) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60); return h > 0 ? `${h}h ${m}m` : `${m}m`; }

    function showRideDetail(p) {
      const mi = (p.distance / 1609.34).toFixed(1);
      document.getElementById('ride-name').textContent = p.name;
      document.getElementById('ride-stats').innerHTML = `${mi} mi<br>${fmtTime(p.moving_time)} riding time<br>${fmtTime(p.elapsed_time)} total`;
      document.getElementById('profile-card').style.display = 'none';
      document.getElementById('ride-detail').classList.add('visible');
    }

    function hideRideDetail() {
      document.getElementById('ride-detail').classList.remove('visible');
      document.getElementById('profile-card').style.display = '';
    }

    function addTab(parent, name, count, onClick) {
      const btn = document.createElement('button');
      btn.className = 'region-btn' + (name === 'all' ? ' active' : '');
      btn.innerHTML = `${name}<span class="count">${count}</span>`;
      btn.addEventListener('click', () => onClick(btn));
      parent.appendChild(btn);
    }

    function setActiveTab(btn) {
      document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function applyFilter(filter) {
      map.setFilter('rides-layer', filter);
      map.setFilter('rides-hit', filter);
      map.setFilter('rides-hover', NO_MATCH);
    }

    init();
  </script>
</body>
</html>
