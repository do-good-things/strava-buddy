<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oops - ridesometime</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; color: #333;
      min-height: 100svh; display: flex; flex-direction: column; align-items: center;
    }
    .spacer { flex: 1; }
    .page { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .page h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: 0.02em; }
    .page p { font-size: 0.85rem; color: #999; }
    .page a.btn {
      display: inline-block; padding: 0.6rem 1.5rem;
      background: #fc4c02; color: #fff; text-decoration: none;
      border-radius: 4px; font-size: 0.9rem; transition: background 0.15s;
    }
    @media (hover: hover) { .page a.btn:hover { background: #e04400; } }
  </style>
</head>
<body>
  <div class="spacer"></div>
  <div class="page">
    <h1>oops</h1>
    <p>sorry, we couldn't find that page</p>
    <a class="btn" href="/">go home</a>
  </div>
  <div class="spacer"></div>
</body>
</html>
