<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oops - ridesometime</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; color: #333;
      min-height: 100svh; display: flex; flex-direction: column; align-items: center;
    }
    .spacer { flex: 1; }
    .page { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .page h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: 0.02em; }
    .page p { font-size: 0.85rem; color: #999; }
    .page .back { font-size: 0.8rem; color: #ccc; text-decoration: none; }
    @media (hover: hover) { .page .back:hover { color: #999; } }
  </style>
</head>
<body>
  <div class="spacer"></div>
  <div class="page">
    <h1>oops</h1>
    <p>sorry, we couldn't find that page</p>
    <a class="back" href="/">back</a>
  </div>
  <div class="spacer"></div>
</body>
</html>
