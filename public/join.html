<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>join - ridesometime</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff; color: #333;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .join { text-align: center; }
    .join h1 { font-size: 1.5rem; font-weight: 400; letter-spacing: 0.02em; margin-bottom: 0.5rem; }
    .join p { font-size: 0.85rem; color: #999; margin-bottom: 2rem; }
    .join a.btn {
      display: inline-block; padding: 0.6rem 1.5rem;
      background: #fc4c02; color: #fff; text-decoration: none;
      border-radius: 4px; font-size: 0.9rem; transition: background 0.15s;
    }
    @media (hover: hover) { .join a.btn:hover { background: #e04400; } }
    .join .back { display: block; margin-top: 1.5rem; font-size: 0.8rem; color: #ccc; text-decoration: none; }
    @media (hover: hover) { .join .back:hover { color: #999; } }
  </style>
</head>
<body>
  <div class="join">
    <h1>join ridesometime</h1>
    <p>connect your strava account to map your rides</p>
    <a class="btn" href="/auth/strava">connect with strava</a>
    <a class="back" href="/">back</a>
  </div>
</body>
</html>
