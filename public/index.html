<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ride sometime</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #333;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .profiles {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      padding: 2rem;
    }
    .profile-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: inherit;
      padding: 1.5rem 2rem;
      border-radius: 8px;
      border: 2px solid #eee;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-width: 160px;
    }
    .profile-link:hover {
      border-color: #e040a0;
      box-shadow: 0 2px 12px rgba(224, 64, 160, 0.1);
    }
    .profile-link img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 0.75rem;
    }
    .profile-link .name {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .profile-link .subtitle {
      font-size: 0.8rem;
      color: #999;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <div class="profiles">
    <a class="profile-link" href="/sarah">
      <img src="https://dgalywyr863hv.cloudfront.net/pictures/athletes/118918676/28452476/15/large.jpg" alt="Sarah Snow">
      <span class="name">Sarah Snow</span>
      <span class="subtitle">San Francisco</span>
    </a>
  </div>
</body>
</html>
